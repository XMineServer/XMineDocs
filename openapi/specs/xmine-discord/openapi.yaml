openapi: "3.0.0"
info:
  title: discord-service
  version: "1.0.0"

tags:
  - name: OAuth
    description: HTTP-flow привязки/входа через Discord OAuth2.
  - name: Discord
    description: Привязанный Discord-профиль текущего пользователя.

paths:
  /auth/discord/redirect:
    get:
      operationId: OAuthRedirect
      tags:
        - OAuth
      summary: Запуск OAuth2-flow привязки/входа через Discord
      parameters:
        - name: code
          in: query
          required: true
          description: Код привязки, выданный Identity Service.
          schema:
            type: string
        - name: mode
          in: query
          required: true
          description: "Режим использования кода: привязка нового аккаунта (`link`) или вход по существующей привязке (`login`)."
          schema:
            type: string
            enum: [link, login]
      responses:
        "302":
          description: Редирект на authorize-страницу Discord
          headers:
            Location:
              schema:
                type: string
        "400":
          description: Отсутствует или некорректен code/mode
        "500":
          description: Внутренняя ошибка

  /auth/discord/callback:
    get:
      operationId: OAuthCallback
      tags:
        - OAuth
      summary: Callback Discord OAuth2, завершающий flow привязки/входа
      parameters:
        - name: state
          in: query
          required: true
          description: Непрозрачный state-идентификатор, возвращённый Discord, связывающий callback с исходным запросом `OAuthRedirect`.
          schema:
            type: string
        - name: code
          in: query
          required: false
          description: Код авторизации Discord OAuth2; отсутствует, если пользователь отказал в доступе.
          schema:
            type: string
      responses:
        "302":
          description: Редирект на страницу успеха/ошибки сайта
          headers:
            Location:
              schema:
                type: string

  /discord/me:
    get:
      operationId: DiscordMe
      tags:
        - Discord
      summary: Получить привязанный Discord-профиль текущего пользователя
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Discord-профиль
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResponse"
        "401":
          description: Отсутствует или невалиден bearer-токен
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: У игрока нет привязки Discord
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Внутренняя ошибка
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT, выданный Identity Service (RS256). Используется для идентификации игрока.

  schemas:
    MeResponse:
      type: object
      required: [discord_id, username, global_name, avatar_url]
      properties:
        discord_id:
          type: string
          description: Discord snowflake id привязанного аккаунта.
        username:
          type: string
          description: Discord-юзернейм (без дискриминатора).
        global_name:
          type: string
          description: Отображаемое имя Discord, общее для всех серверов.
        avatar_url:
          type: string
          description: URL аватара пользователя в Discord.

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
          description: Машиночитаемый код ошибки.
