openapi: "3.0.0"
info:
  title: xmine-identity
  version: "1.0.0"
  description: Сервис входа по логину/паролю и привязки Minecraft-игроков к внешним провайдерам (Discord/VK/Telegram).

tags:
  - name: Auth
    description: Публичный вход по логину/паролю и управление токенами сессии.
  - name: Account Linking
    description: Привязка Minecraft-игроков к аккаунтам внешних провайдеров (защищено X-Internal-Token).

paths:
  /auth/login:
    post:
      operationId: Login
      tags:
        - Auth
      summary: Вход по логину и паролю
      description: Аутентифицирует игрока по Minecraft-логину и паролю и выдаёт пару токенов.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Пара токенов выдана
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          description: Неверный логин или пароль (один и тот же ответ в обоих случаях).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Превышен лимит попыток входа (5 в минуту на пару IP+логин).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          $ref: "#/components/responses/InternalError"

  /auth/refresh:
    post:
      operationId: Refresh
      tags:
        - Auth
      summary: Обновление access-токена по refresh-токену
      description: Выдаёт новый access-токен по refresh-токену. Сам refresh-токен не изменяется и не продлевается.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: Новый access-токен выдан
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          description: Refresh-токен невалиден, отозван или истёк.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          $ref: "#/components/responses/InternalError"

  /auth/logout:
    post:
      operationId: Logout
      tags:
        - Auth
      summary: Отзыв refresh-токена
      description: Отзывает refresh-токен. Уже выданные access-токены остаются действительными до истечения своего срока жизни.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: Выход выполнен
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /auth/me:
    get:
      operationId: Me
      tags:
        - Auth
      summary: Профиль текущего игрока
      description: Возвращает профиль аутентифицированного игрока и список привязанных провайдеров (без provider_id).
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Профиль игрока
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /internal/link/code:
    post:
      operationId: GenerateLinkCode
      tags:
        - Account Linking
      summary: Генерация кода привязки
      description: Генерирует одноразовый код для привязки игрока к провайдеру.
      security:
        - internalToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateCodeRequest"
      responses:
        "200":
          description: Код сгенерирован
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateCodeResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"

  /internal/link/confirm:
    post:
      operationId: ConfirmLink
      tags:
        - Account Linking
      summary: Подтверждение кода привязки
      description: Подтверждает код привязки идентификатором аккаунта у провайдера и завершает привязку.
      security:
        - internalToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfirmLinkRequest"
      responses:
        "200":
          description: Привязка подтверждена
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayerResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          description: Код не найден.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: provider_id уже привязан к другому игроку, либо у игрока уже есть привязка этого провайдера.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "410":
          description: Код истёк или уже использован.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          $ref: "#/components/responses/InternalError"

  /internal/link/login:
    post:
      operationId: LoginByProvider
      tags:
        - Account Linking
      summary: Вход по подтверждённой привязке провайдера
      description: Выдаёт пару токенов по provider_id подтверждённой привязки (аналог `/auth/login`, но без логина и пароля).
      security:
        - internalToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProviderLoginRequest"
      responses:
        "200":
          description: Пара токенов выдана
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          description: Привязки с таким provider_id нет.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          $ref: "#/components/responses/InternalError"

  /internal/link:
    delete:
      operationId: Unlink
      tags:
        - Account Linking
      summary: Удаление привязки
      description: Удаляет привязку игрока к провайдеру. Если оба query-параметра отсутствуют, дополнительно принимается устаревшее тело запроса `UnlinkRequest`.
      security:
        - internalToken: []
      parameters:
        - name: player_uuid
          in: query
          description: UUID игрока.
          schema:
            type: string
        - name: provider
          in: query
          description: Идентификатор провайдера.
          schema:
            type: string
      responses:
        "200":
          description: Привязка удалена
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          description: Привязки не было.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          $ref: "#/components/responses/InternalError"

  /internal/links/{uuid}:
    get:
      operationId: ListLinks
      tags:
        - Account Linking
      summary: Список привязанных провайдеров
      description: Возвращает список провайдеров, привязанных к игроку (только имена, без provider_id).
      security:
        - internalToken: []
      parameters:
        - name: uuid
          in: path
          required: true
          description: UUID игрока.
          schema:
            type: string
      responses:
        "200":
          description: Привязанные провайдеры
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LinksListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"

  /internal/link/{uuid}/{provider}:
    get:
      operationId: ResolveLink
      tags:
        - Account Linking
      summary: Резолв provider_id игрока
      description: Возвращает provider_id игрока для указанного провайдера.
      security:
        - internalToken: []
      parameters:
        - name: uuid
          in: path
          required: true
          description: UUID игрока.
          schema:
            type: string
        - name: provider
          in: path
          required: true
          description: "Идентификатор провайдера (`telegram`, `discord`, `vk`, ...)."
          schema:
            type: string
      responses:
        "200":
          description: provider_id найден
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderIDResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          description: Привязки нет.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          $ref: "#/components/responses/InternalError"

  /internal/link/by-provider/{provider}/{provider_id}:
    get:
      operationId: FindPlayerByProvider
      tags:
        - Account Linking
      summary: Поиск игрока по аккаунту провайдера
      description: Возвращает игрока (UUID и текущий ник), привязанного к указанному аккаунту провайдера.
      security:
        - internalToken: []
      parameters:
        - name: provider
          in: path
          required: true
          description: Идентификатор провайдера.
          schema:
            type: string
        - name: provider_id
          in: path
          required: true
          description: Id игрока у провайдера (Telegram chat id, Discord snowflake и т.п.).
          schema:
            type: string
      responses:
        "200":
          description: Игрок найден
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayerResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          description: Привязки нет.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          $ref: "#/components/responses/InternalError"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT, выданный Identity при логине. Используется для идентификации игрока.
    internalToken:
      type: apiKey
      in: header
      name: X-Internal-Token
      description: Общий секрет для доверенных серверных вызовов от других сервисов XMine.

  schemas:
    LoginRequest:
      type: object
      properties:
        username:
          type: string
          description: Minecraft-логин игрока.
        password:
          type: string
          description: Пароль аккаунта.

    RefreshRequest:
      type: object
      properties:
        refresh_token:
          type: string
          description: Refresh-токен, ранее выданный `Login` или `LoginByProvider`.

    TokenResponse:
      type: object
      required: [access_token, expires_in]
      properties:
        access_token:
          type: string
          description: "Короткоживущий JWT для заголовка `Authorization: Bearer` в последующих запросах."
        refresh_token:
          type: string
          description: Долгоживущий токен для получения нового access-токена через `Refresh`.
        expires_in:
          type: integer
          description: Время жизни access-токена в секундах.

    StatusResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          description: Всегда `"ok"` при успехе.

    LinkInfo:
      type: object
      required: [provider, linked_at]
      description: Факт привязки провайдера, без provider_id.
      properties:
        provider:
          type: string
        linked_at:
          type: string
          format: date-time

    MeResponse:
      type: object
      required: [uuid, username, links]
      description: Не содержит provider_id — для получения id игрока у провайдера используйте `ResolveLink`.
      properties:
        uuid:
          type: string
          description: UUID игрока.
        username:
          type: string
          description: Текущий Minecraft-ник.
        links:
          type: array
          items:
            $ref: "#/components/schemas/LinkInfo"
          description: Провайдеры, привязанные к игроку.

    GenerateCodeRequest:
      type: object
      properties:
        player_uuid:
          type: string
          description: UUID игрока, запрашивающего код.
        provider:
          type: string
          description: "Провайдер, под который будет подтверждён код (`telegram`, `discord`, `vk`, ...)."

    GenerateCodeResponse:
      type: object
      required: [code, expires_in]
      properties:
        code:
          type: string
          description: Одноразовый код привязки, показывается игроку.
        expires_in:
          type: integer
          description: Время жизни кода в секундах.

    ConfirmLinkRequest:
      type: object
      properties:
        code:
          type: string
          description: Код привязки, сгенерированный `GenerateLinkCode`.
        provider:
          type: string
          description: Провайдер, подтверждающий код.
        provider_id:
          type: string
          description: Id игрока у провайдера (например, Telegram chat id, Discord snowflake).

    ProviderLoginRequest:
      type: object
      properties:
        provider:
          type: string
          description: Провайдер, через который выполняется вход.
        provider_id:
          type: string
          description: Id игрока у провайдера, подтверждённый ранее через `ConfirmLink`.

    UnlinkRequest:
      type: object
      deprecated: true
      description: Устаревшая форма тела запроса для `DELETE /internal/link`; используется только если query-параметры `player_uuid`/`provider` не переданы. Используйте query-параметры.
      properties:
        player_uuid:
          type: string
          description: UUID игрока для отвязки.
        provider:
          type: string
          description: Провайдер, для которого удаляется привязка.

    PlayerResponse:
      type: object
      required: [player_uuid, username]
      properties:
        player_uuid:
          type: string
          description: UUID игрока.
        username:
          type: string
          description: Текущий Minecraft-ник.

    LinksListResponse:
      type: object
      required: [links]
      properties:
        links:
          type: array
          items:
            type: string
          description: Имена провайдеров, привязанных к игроку (без provider_id).

    ProviderIDResponse:
      type: object
      required: [provider_id]
      properties:
        provider_id:
          type: string
          description: Id игрока у запрошенного провайдера.

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
          description: Машиночитаемый код ошибки.

  responses:
    BadRequest:
      description: Некорректный запрос
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Не найдено
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Не авторизован
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    InternalError:
      description: Внутренняя ошибка сервера
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
