openapi: "3.0.0"
info:
  title: authority-service
  version: "1.0.0"

paths:
  /rank:
    get:
      operationId: GetOwnRank
      summary: Get the rank of the player identified by the JWT bearer token
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Rank"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /rank/{uuid}:
    get:
      operationId: GetRankByUUID
      summary: Get the rank of a player by UUID (internal callers only)
      security:
        - internalToken: []
      parameters:
        - name: uuid
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Rank"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /health:
    get:
      operationId: GetHealth
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
        "503":
          description: Degraded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    internalToken:
      type: apiKey
      in: header
      name: X-Internal-Token

  schemas:
    Group:
      type: object
      required: [name, weight, expires_at]
      properties:
        name:
          type: string
        weight:
          type: integer
        expires_at:
          type: integer
          format: int64
          nullable: true

    Rank:
      type: object
      required: [uuid, permissions, groups]
      properties:
        uuid:
          type: string
        permissions:
          type: array
          items:
            type: string
        groups:
          type: array
          items:
            $ref: "#/components/schemas/Group"

    HealthStatus:
      type: object
      required: [status, luckperms]
      properties:
        status:
          type: string
        luckperms:
          type: boolean

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

  responses:
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ServiceUnavailable:
      description: Service unavailable
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
