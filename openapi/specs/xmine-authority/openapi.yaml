openapi: "3.0.0"
info:
  title: authority-service
  version: "1.0.0"

tags:
  - name: Rank
    description: Разрешение ранга/прав игрока через LuckPerms.

paths:
  /rank:
    get:
      operationId: GetOwnRank
      tags:
        - Rank
      summary: Получить ранг игрока по JWT bearer-токену
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Успех
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Rank"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /rank/{uuid}:
    get:
      operationId: GetRankByUUID
      tags:
        - Rank
      summary: Получить ранг игрока по UUID (только для внутренних вызовов)
      security:
        - internalToken: []
      parameters:
        - name: uuid
          in: path
          required: true
          description: UUID игрока.
          schema:
            type: string
      responses:
        "200":
          description: Успех
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Rank"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT, выданный Identity Service (RS256). Используется для идентификации игрока.
    internalToken:
      type: apiKey
      in: header
      name: X-Internal-Token
      description: Общий секрет для доверенных серверных вызовов от других сервисов XMine.

  schemas:
    Group:
      type: object
      required: [name, weight, expires_at]
      properties:
        name:
          type: string
          description: Название группы LuckPerms.
        weight:
          type: integer
          description: Вес группы LuckPerms; при принадлежности к нескольким группам выигрывает группа с большим весом.
        expires_at:
          type: integer
          format: int64
          nullable: true
          description: Unix-время (в секундах), когда истекает участие в группе, либо null, если группа постоянная.

    Rank:
      type: object
      required: [uuid, permissions, groups]
      properties:
        uuid:
          type: string
          description: UUID игрока.
        permissions:
          type: array
          items:
            type: string
          description: Разрешённые permission-ноды, действующие для игрока.
        groups:
          type: array
          items:
            $ref: "#/components/schemas/Group"
          description: Группы LuckPerms, в которых состоит игрок.

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
          description: Машиночитаемый код ошибки.

  responses:
    Unauthorized:
      description: Не авторизован
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Не найдено
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ServiceUnavailable:
      description: Сервис недоступен
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
