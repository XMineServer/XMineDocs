<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>XMine API Docs</title>
  <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist/swagger-ui.css"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex;
      height: 100vh;
      overflow: hidden;
      background: #1a1a2e;
      color: #e0e0e0;
    }

    /* Sidebar */
    #sidebar {
      width: 240px;
      min-width: 240px;
      background: #16213e;
      border-right: 1px solid #0f3460;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #sidebar-header {
      padding: 20px 16px 16px;
      border-bottom: 1px solid #0f3460;
    }

    #sidebar-header h1 {
      font-size: 16px;
      font-weight: 700;
      color: #e94560;
      letter-spacing: 0.5px;
    }

    #sidebar-header p {
      font-size: 11px;
      color: #888;
      margin-top: 4px;
    }

    #service-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }

    .service-item {
      padding: 10px 16px;
      cursor: pointer;
      font-size: 13px;
      color: #aaa;
      border-left: 3px solid transparent;
      transition: all 0.15s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .service-item:hover {
      background: #0f3460;
      color: #fff;
    }

    .service-item.active {
      background: #0f3460;
      color: #e94560;
      border-left-color: #e94560;
      font-weight: 600;
    }

    .service-badge {
      display: inline-block;
      font-size: 9px;
      padding: 1px 5px;
      border-radius: 3px;
      margin-left: 6px;
      background: #0f3460;
      color: #888;
      vertical-align: middle;
    }

    .service-item.active .service-badge {
      background: #e94560;
      color: #fff;
    }

    #sidebar-footer {
      padding: 12px 16px;
      border-top: 1px solid #0f3460;
      font-size: 11px;
      color: #555;
    }

    /* Main content */
    #content {
      flex: 1;
      overflow-y: auto;
      background: #fff;
    }

    #swagger-ui .topbar { display: none; }

    /* Empty state */
    #empty-state {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      flex-direction: column;
      gap: 12px;
      color: #888;
      background: #f8f8f8;
    }

    #empty-state h2 { font-size: 18px; color: #333; }
    #empty-state p  { font-size: 14px; }
  </style>
</head>
<body>

<div id="sidebar">
  <div id="sidebar-header">
    <h1>⛏ XMine API</h1>
    <p id="spec-count">Loading specs...</p>
  </div>
  <div id="service-list"></div>
  <div id="sidebar-footer">
    Updated on push to main
  </div>
</div>

<div id="content">
  <div id="empty-state">
    <h2>Select a service</h2>
    <p>Choose a service from the sidebar to view its API documentation.</p>
  </div>
  <div id="swagger-ui" style="display:none"></div>
</div>

<script src="https://unpkg.com/swagger-ui-dist/swagger-ui-bundle.js"></script>
<script>
  // Список сервисов загружается из specs/index.json
  // который автоматически обновляется GitHub Actions при каждом пуше спеки
  async function loadSpecs() {
    const res = await fetch('specs/index.json?t=' + Date.now());
    if (!res.ok) return [];
    return res.json();
  }

  let ui = null;

  function loadService(spec) {
    document.getElementById('empty-state').style.display = 'none';
    document.getElementById('swagger-ui').style.display = 'block';

    document.querySelectorAll('.service-item').forEach(el => el.classList.remove('active'));
    document.querySelector(`[data-id="${spec.id}"]`)?.classList.add('active');

    if (ui) {
      ui = SwaggerUIBundle({
        url: spec.url + '?t=' + Date.now(),
        dom_id: '#swagger-ui',
        presets: [SwaggerUIBundle.presets.apis, SwaggerUIBundle.SwaggerUIStandalonePreset],
        layout: 'BaseLayout',
        deepLinking: true,
        defaultModelsExpandDepth: 1,
        defaultModelExpandDepth: 1,
      });
    } else {
      ui = SwaggerUIBundle({
        url: spec.url + '?t=' + Date.now(),
        dom_id: '#swagger-ui',
        presets: [SwaggerUIBundle.presets.apis, SwaggerUIBundle.SwaggerUIStandalonePreset],
        layout: 'BaseLayout',
        deepLinking: true,
        defaultModelsExpandDepth: 1,
        defaultModelExpandDepth: 1,
      });
    }

    history.replaceState(null, '', '#' + spec.id);
  }

  async function init() {
    const specs = await loadSpecs();
    const list = document.getElementById('service-list');
    const count = document.getElementById('spec-count');

    if (!specs.length) {
      count.textContent = 'No specs yet';
      list.innerHTML = '<div class="service-item" style="cursor:default;color:#555">No services published yet</div>';
      return;
    }

    count.textContent = specs.length + ' service' + (specs.length > 1 ? 's' : '');

    specs.forEach(spec => {
      const el = document.createElement('div');
      el.className = 'service-item';
      el.dataset.id = spec.id;
      el.innerHTML = spec.name + '<span class="service-badge">REST</span>';
      el.onclick = () => loadService(spec);
      list.appendChild(el);
    });

    // Открыть сервис из хэша URL или первый по умолчанию
    const hash = location.hash.slice(1);
    const target = specs.find(s => s.id === hash) || specs[0];
    loadService(target);
  }

  init();
</script>
</body>
</html>
